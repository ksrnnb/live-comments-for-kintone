<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <title>Live Comments for kintone</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
        "Noto Sans JP", sans-serif;
    }

    body {
      margin: 0;
      padding: 12px 14px;
      min-width: 240px;
      font-size: 13px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 600;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>新着通知を自動展開する画面</h1>
  <ul id="list"></ul>
  <script src="popup.js"></script>
</body>

</html>
